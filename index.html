<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Practice Part 2 - Flashcards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="toolbar">
        <div class="tool-group">
            <label for="test-select"><strong>Bài Test:</strong></label>
            <select id="test-select" onchange="changeSettings()">
                <option value="all">Tất cả các Test (1 - 5)</option>
                <option value="1">Test 1 - Café & TV Show</option>
                <option value="2">Test 2 - College & Boat</option>
                <option value="3">Test 3 - Campsite & Coach</option>
                <option value="4">Test 4 - Club & Museum</option>
                <option value="5">Test 5 - Present & School</option>
            </select>
        </div>
        <div class="tool-group">
            <label for="role-select"><strong>Thứ tự:</strong></label>
            <select id="role-select" onchange="changeSettings()">
                <option value="askFirst">Hỏi phần A ➔ Trả lời phần B</option>
                <option value="answerFirst">Trả lời phần A ➔ Hỏi phần B</option>
            </select>
        </div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab('learn')">📖 Learn</button>
        <button class="tab-btn" onclick="switchTab('quiz')">🎯 Quiz</button>
        <button class="tab-btn" onclick="switchTab('write')">✍️ Write</button>
    </nav>

    <div id="learn" class="tab-content active">
        <h2>Danh sách thẻ từ</h2>
        <div id="flashcard-container"></div>
    </div>

    <div id="quiz" class="tab-content">
        <h2>Chọn đáp án đúng</h2>
        <img id="quiz-img" class="question-img" src="" alt="Question Image" style="display: none;">
        <div class="question-box" id="quiz-question">Đang tải câu hỏi...</div>
        <div class="options-grid" id="quiz-options"></div>
        <button class="action-btn" onclick="nextQuiz()">Câu tiếp theo ➔</button>
    </div>

    <div id="write" class="tab-content">
        <h2>Viết câu trả lời</h2>
        <img id="write-img" class="question-img" src="" alt="Question Image" style="display: none;">
        <div class="question-box" id="write-question">Đang tải câu hỏi...</div>
        <input type="text" id="write-input" placeholder="Gõ câu trả lời của bạn vào đây..." onkeypress="handleEnter(event)">
        <button class="action-btn" onclick="checkWrite()">Kiểm tra</button>
        <div class="feedback" id="write-feedback"></div>
        <button class="action-btn" style="background-color: #6B7280; display: none;" id="write-next-btn" onclick="nextWrite()">Câu tiếp theo ➔</button>
    </div>
</div>

<script src="app.js/main.js"></script>

</body>
</html>
